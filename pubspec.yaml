name: affinidi_tdk_dart
description: Dart Packages for Affinidi TDK
publish_to: "none"
environment:
  sdk: ^3.6.0
workspace:
  - packages/auth_provider
  - packages/claim_verifiable_credential
  - packages/common
  - packages/common/example
  - packages/consumer_auth_provider
  - packages/consumer_auth_provider/example
  - packages/cryptography
  - packages/iota_core
  - packages/seed_cryptography
